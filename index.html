<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CC Scribe</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Splash screen -->
  <div id="splash">
    <video id="splash-video" autoplay muted playsinline>
      <source src="splash.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Header -->
  <header id="topbar">
    <h1>CC Scribe</h1>
    <div class="topbar-right">
      <span id="status-badge" class="status-badge idle">Ready</span>
      <button id="settings-btn" class="icon-btn" title="Settings">&#9881;</button>
    </div>
  </header>

  <!-- Controls -->
  <div id="controls">
    <button id="rec-btn" class="rec-btn">
      <span class="rec-dot"></span>
      <span id="rec-label">START</span>
    </button>
    <span id="elapsed">00:00</span>
    <div id="level-bar"><div id="level-fill"></div></div>
  </div>

  <!-- Translation feed -->
  <div id="feed"></div>

  <!-- Bottom bar -->
  <div id="bottom-bar">
    <button id="share-btn" class="action-btn">Copy Live Link</button>
    <button id="clear-btn" class="action-btn" disabled>Clear</button>
  </div>

  <!-- Settings panel (slide-out) -->
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-header">
      <h2>Settings</h2>
      <button id="settings-close" class="icon-btn">&times;</button>
    </div>
    <div class="settings-body">
      <!-- This Device -->
      <div class="settings-section">
        <h3>This Device</h3>
        <label class="setting-row">
          <input type="checkbox" id="show-zh" checked> Chinese
        </label>
        <label class="setting-row">
          <input type="checkbox" id="show-en" checked> English
        </label>
        <label class="setting-row">
          <input type="checkbox" id="show-pl" checked> Polish
        </label>
        <div class="setting-row">
          <label for="font-size">Font size</label>
          <input type="range" id="font-size" min="60" max="200" value="100" step="10">
          <span id="font-size-val">100%</span>
        </div>
      </div>

      <!-- Live Sharing -->
      <div class="settings-section">
        <h3>Live Sharing</h3>
        <label class="setting-row">
          <input type="checkbox" id="live-zh" checked> Chinese
        </label>
        <label class="setting-row">
          <input type="checkbox" id="live-en" checked> English
        </label>
        <label class="setting-row">
          <input type="checkbox" id="live-pl" checked> Polish
        </label>
        <div class="setting-row">
          <label for="live-font">Font size</label>
          <input type="range" id="live-font" min="60" max="300" value="150" step="10">
          <span id="live-font-val">150%</span>
        </div>
      </div>

      <!-- Advanced (collapsible) -->
      <div class="settings-section">
        <h3 class="settings-toggle" id="advanced-toggle">Advanced <span class="toggle-arrow">&#9654;</span></h3>
        <div id="advanced-body" class="advanced-body hidden">
          <div class="setting-row">
            <label for="openai-key">OpenAI</label>
            <input type="password" id="openai-key" placeholder="sk-..." autocomplete="off">
          </div>
          <div class="setting-row">
            <label for="anthropic-key">Anthropic</label>
            <input type="password" id="anthropic-key" placeholder="sk-ant-..." autocomplete="off">
          </div>
          <div class="setting-row">
            <label for="worker-url">Whisper Proxy</label>
            <input type="url" id="worker-url" placeholder="https://cc-scribe-proxy.workers.dev" autocomplete="off">
          </div>
          <div class="setting-row">
            <label for="supabase-url">Supabase URL</label>
            <input type="url" id="supabase-url" placeholder="https://xxx.supabase.co" autocomplete="off">
          </div>
          <div class="setting-row">
            <label for="supabase-key">Supabase Key</label>
            <input type="password" id="supabase-key" placeholder="eyJ..." autocomplete="off">
          </div>
          <button id="share-config-btn" class="share-config-btn">Share Config</button>
          <div id="app-version" class="app-version"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Overlay for settings -->
  <div id="settings-overlay" class="settings-overlay hidden"></div>

  <!-- PIN dialog -->
  <div id="pin-overlay" class="pin-overlay hidden"></div>
  <div id="pin-dialog" class="pin-dialog hidden">
    <h3 id="pin-title">Enter PIN</h3>
    <p id="pin-subtitle" class="pin-subtitle"></p>
    <input type="tel" id="pin-input" class="pin-input" maxlength="6"
           pattern="[0-9]*" inputmode="numeric" placeholder="4-6 digits" autocomplete="off">
    <div id="pin-error" class="pin-error hidden"></div>
    <div class="pin-actions">
      <button id="pin-cancel" class="pin-btn">Cancel</button>
      <button id="pin-confirm" class="pin-btn pin-btn-confirm">OK</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Supabase client (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="lib/pinyin-pro.js"></script>
  <script src="pinyin_matcher.js"></script>
  <script src="app.js"></script>
</body>
</html>
